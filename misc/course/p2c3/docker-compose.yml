services:
  # Declare the Minio service, which will expose its admin console
  # at http://localhost:9001
  #
  # Admin credentials:
  # - User: minio
  # - Password: NotSoSecret
  #
  # Data stored by the Minio service will be placed
  # in the /data directory, using a named volume
  # called "minio_storage".
  minio:
    image: minio/minio
    ports:
      - 9001:9001
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: NotSoSecret
    command: server --console-address ":9001" /data

  # Declare the "libra" service, using the "libra:latest" image
  # built in the previous exercise.
  libra:
    image: libra:latest
    # The Libra application will be available at http://localhost:8080
    ports:
      - 8080:8080
    environment:
      # Configure Libra to use the "minio" service.
      # See cmd/libra/store.go in the application sources
      # for more information.
      LIBRA_STORE_DSN: s3://minio:NotSoSecret@minio:9000/libra

# Declare the volumes used by the various services.
volumes:
  minio_storage:
